name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      # Smokes and typecheck don't need the headless browser; skip the ~150 MB download.
      EXXETA_SKIP_BROWSER_INSTALL: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck web UI (app + fixtures)
        run: npx tsc --noEmit -p apps/web-ui/tsconfig.json

      - name: Smoke suite
        run: npm run smokes
